<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notifications - NGOHubX</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="dashboard.css" />
  <style>
    /* Notification Specific Styles */
    .notif-filters {
      display: flex;
      gap: 15px;
      margin-bottom: 25px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border-color);
      overflow-x: auto;
    }

    .notif-filter-btn {
      background: var(--bg-white);
      border: 1px solid var(--border-color);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dark);
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
    }

    .notif-filter-btn:hover {
      background: var(--bg-main);
      border-color: var(--primary-light);
    }

    .notif-filter-btn.active {
      background: var(--primary-green);
      color: white;
      border-color: var(--primary-green);
    }

    .notif-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .notif-card {
      background: var(--bg-white);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 20px;
      display: flex;
      gap: 20px;
      box-shadow: var(--shadow-sm);
      transition: var(--transition);
      position: relative;
    }
    
    .notif-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .notif-card.unread { background: #fdfdfd; border-left: 4px solid var(--info-blue); }
    .notif-card.unread .notif-title { font-weight: 700; }
    
    .notif-icon {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    /* Color Codings */
    .icon-blue { background: #eff6ff; color: #3b82f6; }     /* New Assignments / General */
    .icon-red { background: #fef2f2; color: #ef4444; }       /* Deadlines / Emergency */
    .icon-green { background: #f0fdf4; color: #10b981; }     /* Success / Approvals */
    .icon-gold { background: #fffbeb; color: #f59e0b; }      /* Rewards / Badges */

    .notif-content { flex-grow: 1; }
    .notif-meta { display: flex; justify-content: space-between; margin-bottom: 5px; }
    .notif-time { font-size: 12px; color: var(--text-muted); display: flex; align-items:center; gap:5px; }
    
    .notif-category { font-size: 11px; padding: 2px 8px; border-radius: 12px; background: #e5e7eb; font-weight:600; text-transform:uppercase; color: var(--text-dark);}
    .notif-title { font-size: 16px; color: var(--text-dark); margin-bottom: 8px; }
    .notif-desc { font-size: 14px; color: var(--text-muted); line-height: 1.5; margin-bottom: 15px; }

    .notif-actions { display: flex; gap: 10px; align-items:center; }
    .btn-notif-outline { background:transparent; border:1px solid #d1d5db; border-radius:6px; padding:5px 12px; font-size:12px; font-weight:600; cursor:pointer;}
    .btn-notif-outline:hover { background:var(--bg-main); }
    .btn-read { color:var(--info-blue); cursor:pointer; font-size:12px; font-weight:600; border:none; background:none; }
    .btn-read:hover { text-decoration: underline; }

    /* New Unread Dot */
    .unread-indicator {
        position: absolute;
        top: 25px;
        right: 20px;
        width: 10px;
        height: 10px;
        background-color: var(--info-blue);
        border-radius: 50%;
    }
  </style>
</head>

<body>
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header" onclick="window.location.href='Index.html'" style="cursor: pointer;">
      <img src="logoNGO.jpeg" style="height: 35px; width: auto; border-radius: 6px; object-fit: contain;" alt="Logo">
      <span>NGOHubX</span>
    </div>
    
    <div class="sidebar-menu">
      <a href="volunteer-dashboard.html" class="menu-item">
        <i class="fas fa-th-large"></i> Dashboard
      </a>
      <a href="volunteer-tasks.html" class="menu-item">
        <i class="fas fa-search-location"></i> Find Tasks
      </a>
      <a href="volunteer-tasks.html" class="menu-item">
        <i class="fas fa-clipboard-list"></i> My Tasks
      </a>
      <a href="volunteer-leaderboard.html" class="menu-item">
        <i class="fas fa-trophy"></i> Leaderboard
      </a>
      <a href="volunteer-profile.html" class="menu-item">
        <i class="fas fa-user-circle"></i> My Profile
      </a>
    </div>

    <div class="sidebar-footer">
      <button class="logout-btn" onclick="logout()">
        <i class="fas fa-sign-out-alt"></i> Logout
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <header class="topbar">
      <div class="welcome-text">
        <h1>Notifications</h1>
        <span>Stay updated with your tasks, rewards, and important alerts.</span>
      </div>

      <div class="topbar-actions">
        <button class="notification-btn active" style="color: var(--primary-green);">
          <i class="fas fa-bell"></i>
        </button>
        <div class="user-profile">
          <div class="user-info" style="text-align: right;">
            <span class="user-name" id="volNameDisplay">Volunteer</span>
          </div>
          <img src="https://ui-avatars.com/api/?name=V&background=EFF6FF&color=1D4ED8" id="profileImage" alt="Profile">
        </div>
      </div>
    </header>

    <div class="dashboard-container" style="max-width: 900px;">
      
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="font-size: 18px; color: var(--text-dark);">Inbox (<span id="unreadCount" style="color:var(--info-blue);">2</span> Unread)</h2>
        <button class="btn-action btn-secondary" onclick="markAllRead()" style="font-size:12px; padding:6px 12px;"><i class="fas fa-check-double"></i> Mark All as Read</button>
      </div>

      <!-- Filters -->
      <div class="notif-filters">
        <button class="notif-filter-btn active" onclick="filterNotifs('all', this)">All</button>
        <button class="notif-filter-btn" onclick="filterNotifs('unread', this)">Unread</button>
        <button class="notif-filter-btn" onclick="filterNotifs('tasks', this)">Tasks & Assignments</button>
        <button class="notif-filter-btn" onclick="filterNotifs('rewards', this)">Rewards</button>
        <button class="notif-filter-btn" onclick="filterNotifs('alerts', this)">Urgent Alerts</button>
      </div>

      <!-- Notifications List -->
      <div class="notif-list" id="notifContainer">
        <div style="text-align:center; padding: 50px; color:var(--text-muted);">
          <i class="far fa-bell" style="font-size:40px; margin-bottom:15px; opacity:0.5;"></i>
          <p>Loading your notifications...</p>
        </div>
      </div>

      <div style="text-align: center; margin-top: 30px;">
        <button class="btn-action btn-secondary" style="background:transparent; border:none; box-shadow:none; color:var(--emergency-red); font-weight:600;" onclick="clearAll()"><i class="fas fa-trash-alt"></i> Clear All History</button>
      </div>

    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
  <script src="firebase.js"></script>

  <script>
    let activeNotifFilter = 'all';
    let currentVolunteerId = null;
    let cachedNotifications = [];

    function getTimestampValue(value) {
      if (!value) return 0;
      if (typeof value.toDate === 'function') return value.toDate().getTime();
      const parsed = new Date(value);
      return Number.isNaN(parsed.getTime()) ? 0 : parsed.getTime();
    }

    function formatRelativeTime(value) {
      const timestamp = getTimestampValue(value);
      if (!timestamp) return 'Just now';
      const diffMinutes = Math.max(1, Math.floor((Date.now() - timestamp) / 60000));
      if (diffMinutes < 60) return `${diffMinutes} min ago`;
      const diffHours = Math.floor(diffMinutes / 60);
      if (diffHours < 24) return `${diffHours} hr ago`;
      const diffDays = Math.floor(diffHours / 24);
      return `${diffDays} day${diffDays > 1 ? 's' : ''} ago`;
    }

    function getNotifMeta(notification) {
      const type = notification.type || 'tasks';
      if (type.includes('alerts')) {
        return {
          dataType: 'tasks alerts',
          iconClass: 'icon-red',
          icon: 'fa-triangle-exclamation',
          categoryStyle: 'background:#fef2f2; color:#ef4444;',
          categoryLabel: notification.categoryLabel || 'Urgent Alert',
          actionLabel: 'Open Task'
        };
      }

      if (type.includes('rewards')) {
        return {
          dataType: 'rewards',
          iconClass: 'icon-gold',
          icon: 'fa-medal',
          categoryStyle: 'background:#fffbeb; color:#f59e0b;',
          categoryLabel: notification.categoryLabel || 'Reward',
          actionLabel: 'View Dashboard'
        };
      }

      return {
        dataType: 'tasks',
        iconClass: 'icon-blue',
        icon: 'fa-clipboard-check',
        categoryStyle: 'background:#eff6ff; color:#3b82f6;',
        categoryLabel: notification.categoryLabel || 'Task Assigned',
        actionLabel: 'Open Task'
      };
    }

    function renderNotifications() {
      const container = document.getElementById('notifContainer');
      if (!container) return;

      const notifications = cachedNotifications
        .slice()
        .sort((first, second) => getTimestampValue(second.createdAt) - getTimestampValue(first.createdAt));

      if (notifications.length === 0) {
        container.innerHTML = '<div style="text-align:center; padding: 50px; color:var(--text-muted);"><i class="far fa-bell-slash" style="font-size:40px; margin-bottom:15px; opacity:0.5;"></i><p>No new notifications.</p></div>';
        updateCount();
        return;
      }

      container.innerHTML = notifications.map((notification) => {
        const meta = getNotifMeta(notification);
        const isUnread = !notification.read;
        const destination = meta.dataType.includes('rewards') ? 'volunteer-dashboard.html' : 'volunteer-tasks.html';

        return `
          <div class="notif-card ${isUnread ? 'unread' : ''}" data-id="${notification.id}" data-type="${meta.dataType}">
            ${isUnread ? '<div class="unread-indicator"></div>' : ''}
            <div class="notif-icon ${meta.iconClass}"><i class="fas ${meta.icon}"></i></div>
            <div class="notif-content">
              <div class="notif-meta">
                <span class="notif-category" style="${meta.categoryStyle}">${meta.categoryLabel}</span>
                <span class="notif-time"><i class="far fa-clock"></i> ${formatRelativeTime(notification.createdAt)}</span>
              </div>
              <h3 class="notif-title">${notification.title || 'Notification'}</h3>
              <p class="notif-desc">${notification.message || 'A new update is waiting for you.'}</p>
              <div class="notif-actions">
                <button class="btn-action btn-primary" style="background:${meta.dataType.includes('alerts') ? 'var(--emergency-red)' : 'var(--info-blue)'}; padding:5px 12px; font-size:12px;" onclick="window.location.href='${destination}'">${meta.actionLabel}</button>
                ${isUnread ? `<button class="btn-read" onclick="markSingleRead('${notification.id}')">Mark as Read</button>` : ''}
              </div>
            </div>
          </div>`;
      }).join('');

      applyFilter();
      updateCount();
    }

    function applyFilter() {
      const cards = document.querySelectorAll('.notif-card');
      cards.forEach((card) => {
        if (activeNotifFilter === 'all') {
          card.style.display = 'flex';
        } else if (activeNotifFilter === 'unread') {
          card.style.display = card.classList.contains('unread') ? 'flex' : 'none';
        } else {
          card.style.display = card.getAttribute('data-type').includes(activeNotifFilter) ? 'flex' : 'none';
        }
      });
    }

    function filterNotifs(filterType, btnElement) {
      activeNotifFilter = filterType;
      document.querySelectorAll('.notif-filter-btn').forEach(btn => btn.classList.remove('active'));
      btnElement.classList.add('active');
      applyFilter();
    }

    async function markSingleRead(notificationId) {
      await db.collection('notifications').doc(notificationId).update({ read: true });
    }

    async function markAllRead() {
      const unreadNotifications = cachedNotifications.filter((notification) => !notification.read);
      if (unreadNotifications.length === 0) return;

      const batch = db.batch();
      unreadNotifications.forEach((notification) => {
        batch.update(db.collection('notifications').doc(notification.id), { read: true });
      });
      await batch.commit();
    }

    async function clearAll() {
      if(!confirm('Are you sure you want to delete your entire notification history?')) return;
      if (!cachedNotifications.length) return;

      const batch = db.batch();
      cachedNotifications.forEach((notification) => {
        batch.delete(db.collection('notifications').doc(notification.id));
      });
      await batch.commit();
    }

    function updateCount() {
      const unreadCnt = cachedNotifications.filter((notification) => !notification.read).length;
      document.getElementById('unreadCount').innerText = unreadCnt;
    }

    auth.onAuthStateChanged(async (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      currentVolunteerId = user.uid;

      try {
        const docRef = db.collection("users").doc(user.uid);
        const docSnap = await docRef.get();
        if (docSnap.exists) {
          const nameToDisplay = docSnap.data().fullName || user.email.split('@')[0];
          document.getElementById("volNameDisplay").textContent = nameToDisplay;
          document.getElementById("profileImage").src = `https://ui-avatars.com/api/?name=${encodeURIComponent(nameToDisplay)}&background=EFF6FF&color=1D4ED8&bold=true`;
        }
      } catch(e) {}

      db.collection('notifications').where('recipientId', '==', user.uid).onSnapshot((snapshot) => {
        cachedNotifications = snapshot.docs.map((doc) => ({ id: doc.id, ...doc.data() }));
        renderNotifications();
      });
    });

    async function logout(){
      await auth.signOut();
      localStorage.clear();
      window.location.href = 'Index.html';
    }
  </script>
</body>
</html>
