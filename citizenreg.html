<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Citizen Registration</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="form-page">
  <div class="container">
    <div class="card large">

      <h1>Citizen Portal</h1>
      <p class="subtitle">Register to report and track emergency needs</p>

      <form onsubmit="registerCIT(event)">
        <h2>Citizen Registration</h2>

        <div class="field">
          <label>Full Name</label>
          <input type="text" name="name" placeholder="Enter your name" required>
        </div>

        <div class="field">
          <label>Age</label>
          <input type="number" name="age" placeholder="e.g. 25" required>
        </div>

        <div class="field">
          <label>Phone</label>
          <input type="tel" name="phone" placeholder="+91 XXXXX XXXXX" required>
        </div>

        <div class="field">
          <label>Email</label>
          <input type="email" name="email" placeholder="Enter email" required>
        </div>

        <div class="field">
          <label>Password</label>
          <input type="password" name="pass" placeholder="Create password" required>
        </div>

        <div class="field">
          <label>Confirm Password</label>
          <input type="password" name="cpass" placeholder="Confirm password" required>
        </div>

        <div class="field">
          <label>State</label>
          <input type="text" name="state" placeholder="State" required>
        </div>

        <div class="field">
          <label>City</label>
          <input type="text" name="city" placeholder="City" required>
        </div>

        <div class="field full-row">
          <label>Address</label>
          <input type="text" name="address" placeholder="Full address" required>
        </div>

        <div class="field">
          <label>Primary Language</label>
          <input type="text" name="lang" placeholder="Hindi / English / Other" required>
        </div>

        <div class="field">
          <label>Emergency Contact</label>
          <input type="tel" name="emer" placeholder="+91 XXXXX XXXXX" required>
        </div>

        <div class="full-row">
          <button type="submit" class="btn primary">Register</button>
        </div>

        <p class="small-text">
          Already registered? <a href="login.html">Login Here</a>
        </p>
      </form>

    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="firebase.js"></script>
  <script src="auth.js"></script>
</body>
</html>
