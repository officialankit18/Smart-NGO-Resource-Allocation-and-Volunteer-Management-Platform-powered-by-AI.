<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Volunteer Leaderboard - NGOHubX</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="dashboard.css" />
  <style>
    /* Leaderboard Specific Styles */
    .top-3-container {
        display: flex;
        justify-content: center;
        align-items: flex-end;
        gap: 20px;
        margin-bottom: 40px;
        margin-top: 20px;
    }

    .podium {
        background: var(--bg-white);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-lg) var(--radius-lg) 0 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content:flex-end;
        padding: 20px 20px 0 20px;
        position: relative;
        box-shadow: var(--shadow-sm);
        text-align: center;
    }

    .podium-1 { height: 220px; border-top: 4px solid #fbbf24; z-index: 3; }
    .podium-2 { height: 180px; border-top: 4px solid #9ca3af; z-index: 2; }
    .podium-3 { height: 150px; border-top: 4px solid #b45309; z-index: 1; }

    .podium-img {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        object-fit: cover;
        position: absolute;
        top: -30px;
        border: 4px solid var(--bg-white);
        background: #e5e7eb;
    }

    .podium-1 .podium-img { width: 80px; height: 80px; top: -40px; border-color: #fef3c7; }
    .podium-2 .podium-img { border-color: #f3f4f6; }
    .podium-3 .podium-img { border-color: #fef08a; }

    .podium-rank {
        font-size: 30px;
        font-weight: 800;
        opacity: 0.1;
        position: absolute;
        bottom: 10px;
    }

    .list-row {
        display: flex;
        align-items: center;
        padding: 15px 20px;
        background: var(--bg-white);
        border-radius: var(--radius-md);
        margin-bottom: 10px;
        box-shadow: var(--shadow-sm);
        transition: var(--transition);
        border: 1px solid transparent;
    }
    
    .list-row:hover {
        transform: translateX(5px);
        border-color: var(--primary-light);
    }

    .rank-number {
        width: 30px;
        font-weight: 700;
        color: var(--text-muted);
        font-size: 16px;
    }

    .row-avatar {
        width: 40px; height: 40px; border-radius: 50%; object-fit: cover; margin-right: 15px; background: #e5e7eb;
    }

    .row-info { flex-grow: 1; }
    .row-name { font-weight: 600; color: var(--text-dark); font-size: 15px; }
    .row-date { font-size: 12px; color: var(--text-muted); }

    .row-score {
        font-size: 18px;
        font-weight: 800;
        color: var(--primary-green);
    }
    
    .loading-container {
        text-align: center;
        padding: 50px;
        color: var(--text-muted);
    }
  </style>
</head>

<body>
  <!-- Sidebar for Volunteer -->
  <aside class="sidebar">
    <div class="sidebar-header" onclick="window.location.href='Index.html'" style="cursor: pointer;">
      <img src="logoNGO.jpeg" style="height: 35px; width: auto; border-radius: 6px; object-fit: contain;" alt="Logo">
      <span>NGOHubX</span>
    </div>
    
    <div class="sidebar-menu">
      <a href="volunteer-dashboard.html" class="menu-item">
        <i class="fas fa-th-large"></i> Dashboard
      </a>
      <a href="volunteer-tasks.html" class="menu-item">
        <i class="fas fa-search-location"></i> Find Tasks
      </a>
      <a href="volunteer-tasks.html" class="menu-item">
        <i class="fas fa-clipboard-list"></i> My Tasks
      </a>
      <a href="volunteer-leaderboard.html" class="menu-item active">
        <i class="fas fa-trophy"></i> Leaderboard
      </a>
      <a href="volunteer-profile.html" class="menu-item">
        <i class="fas fa-user-circle"></i> My Profile
      </a>
    </div>

    <div class="sidebar-footer">
      <button class="logout-btn" onclick="logout()">
        <i class="fas fa-sign-out-alt"></i> Logout
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <header class="topbar">
      <div class="welcome-text">
        <h1>Global Leaderboard</h1>
        <span>See how you rank among other real volunteers driven to create change.</span>
      </div>

      <div class="topbar-actions">
        <div class="user-profile">
          <div class="user-info" style="text-align: right;">
            <span class="user-name" id="volNameDisplay">Loading...</span>
            <span class="user-role">Volunteer</span>
          </div>
          <img src="https://ui-avatars.com/api/?name=V&background=EFF6FF&color=1D4ED8" id="profileImage" alt="Profile">
        </div>
      </div>
    </header>

    <div class="dashboard-container">
      
      <div id="loadingIndicator" class="loading-container">
        <i class="fas fa-circle-notch fa-spin" style="font-size: 30px; margin-bottom: 15px; color: var(--primary-green);"></i>
        <p>Fetching real-time volunteer activity from the database...</p>
      </div>

      <div id="leaderboardContent" style="display: none;">
        
        <!-- Top 3 Podium Setup -->
        <div class="top-3-container" id="podiumContainer">
            <!-- Will be injected by JS -->
        </div>

        <div class="panel" style="max-width: 800px; margin: 0 auto;">
           <div class="panel-header" style="margin-bottom: 20px;">
               <h2 class="panel-title"><i class="fas fa-list-ol"></i> Community Rankings</h2>
               <div style="font-size:13px; color:var(--text-muted);">Showing all registered volunteers</div>
           </div>

           <!-- Standard List rows -->
           <div id="rankingsList">
              <!-- Will be injected by JS -->
           </div>
        </div>
      </div>

    </div>
  </main>

  <!-- Firebase Integration -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
  <script src="firebase.js"></script>

  <script>
    let currentUserId = null;

    // Helper to generate a fake "points" score based on UID deterministic math so it persists across refreshes
    // This allows us to have a functioning leaderboard until point system is fully built in the DB
    function generateScoreFromUID(uid) {
        let hash = 0;
        for (let i = 0; i < uid.length; i++) {
            hash = uid.charCodeAt(i) + ((hash << 5) - hash);
        }
        return Math.abs(hash % 1000) + 150; // Random score between 150-1150
    }

    function formatCreatedAt(value) {
        if (!value) return 'Recently';
        if (typeof value.toDate === 'function') return value.toDate().toLocaleDateString();
        const parsed = new Date(value);
        return Number.isNaN(parsed.getTime()) ? 'Recently' : parsed.toLocaleDateString();
    }

    auth.onAuthStateChanged(async (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }
      currentUserId = user.uid;
      
      try {
        const docRef = db.collection("users").doc(user.uid);
        const docSnap = await docRef.get();
        if (docSnap.exists) {
          const nameToDisplay = docSnap.data().fullName || user.email.split('@')[0];
          document.getElementById("volNameDisplay").textContent = nameToDisplay;
          document.getElementById("profileImage").src = `https://ui-avatars.com/api/?name=${encodeURIComponent(nameToDisplay)}&background=EFF6FF&color=1D4ED8&bold=true`;
        }
        
        loadLeaderboard();
      } catch(e) {
          console.error(e);
      }
    });

    async function loadLeaderboard() {
        const loading = document.getElementById('loadingIndicator');
        const content = document.getElementById('leaderboardContent');
        const podium = document.getElementById('podiumContainer');
        const list = document.getElementById('rankingsList');

        try {
            // Fetch all users to find volunteers
            const snapshot = await db.collection("users").get();
            let volunteers = [];
            
            snapshot.forEach(doc => {
                const data = doc.data();
                if (data.role === 'volunteer') {
                    // Assign a score if they don't have one
                    data.impactScore = data.impactScore || generateScoreFromUID(data.uid || doc.id);
                    data.name = data.fullName || data.email.split('@')[0];
                    volunteers.push(data);
                }
            });

            // Sort volunteers by score descending
            volunteers.sort((a, b) => b.impactScore - a.impactScore);

            // Populate UI
            podium.innerHTML = '';
            list.innerHTML = '';

            // Ensure we have at least 3 default dummies if DB is empty to prevent UI breaking
            if (volunteers.length < 3) {
               volunteers.push({ name: "Sarah Connor (Demo)", impactScore: 840, uid: 'dummy1' });
               volunteers.push({ name: "Raj Patel (Demo)", impactScore: 620, uid: 'dummy2' });
               volunteers.push({ name: "Alex Mercer (Demo)", impactScore: 500, uid: 'dummy3' });
               volunteers.sort((a, b) => b.impactScore - a.impactScore);
            }

            // Top 3
            const topMenu = [
               { vol: volunteers[1], class: 'podium-2', rank: 2, iconColor: '#9ca3af' }, // Rank 2 (Left)
               { vol: volunteers[0], class: 'podium-1', rank: 1, iconColor: '#fbbf24' }, // Rank 1 (Center)
               { vol: volunteers[2], class: 'podium-3', rank: 3, iconColor: '#b45309' }  // Rank 3 (Right)
            ];

            topMenu.forEach(item => {
                const vol = item.vol;
                const isMe = vol.uid === currentUserId ? '<div style="font-size:10px; background:var(--primary-green); color:white; padding:2px 5px; border-radius:10px; margin-bottom:5px;">You</div>' : '';
                podium.innerHTML += `
                    <div class="podium ${item.class}" style="width: 140px;">
                        <img src="https://ui-avatars.com/api/?name=${encodeURIComponent(vol.name)}&background=random" class="podium-img">
                        ${isMe}
                        <div style="font-size:14px; font-weight:700; margin-bottom:5px; color:var(--text-dark);">${vol.name}</div>
                        <div style="font-size:16px; font-weight:800; color:${item.iconColor};">${vol.impactScore}</div>
                        <div style="font-size:11px; color:var(--text-muted); margin-bottom:15px;">Points</div>
                        <div class="podium-rank">${item.rank}</div>
                    </div>
                `;
            });

            // Rank 4+ List
            for (let i = 3; i < volunteers.length; i++) {
                const vol = volunteers[i];
                const isMeStyle = vol.uid === currentUserId ? 'border-color: var(--primary-green); background-color: #f0fdf4;' : '';
                
                list.innerHTML += `
                    <div class="list-row" style="${isMeStyle}">
                        <div class="rank-number">${i + 1}</div>
                        <img src="https://ui-avatars.com/api/?name=${encodeURIComponent(vol.name)}&background=random" class="row-avatar">
                        <div class="row-info">
                            <div class="row-name">${vol.name} ${vol.uid === currentUserId ? '<span style="font-size:11px; color:var(--primary-green);">(You)</span>' : ''}</div>
                            <div class="row-date">Joined: ${formatCreatedAt(vol.createdAt)}</div>
                        </div>
                        <div class="row-score">${vol.impactScore}</div>
                    </div>
                `;
            }

            loading.style.display = 'none';
            content.style.display = 'block';

        } catch(e) {
            loading.innerHTML = `<p style="color:var(--emergency-red);">Error loading leaderboard: ${e.message}</p>`;
        }
    }

    async function logout(){
      await auth.signOut();
      localStorage.clear();
      window.location.href = 'Index.html';
    }
  </script>
</body>
</html>
